[workspace]
channels = ["conda-forge"]
name = "obsidian-export"
platforms = ["linux-64", "osx-arm64"]
version = "0.3.0" # x-release-please-version

[dependencies]
python = ">=3.12,<3.15"
pandoc = ">=3.5,<4"
tectonic = ">=0.15,<0.16"
nodejs = ">=20,<22"
librsvg = ">=2.58,<3"
python-build = ">=1.4.0,<2"
hatchling = ">=1.28.0,<2"

[pypi-dependencies]
obsidian-export = {path = ".", editable = true}
pyyaml = ">=6.0,<7"
click = ">=8.0,<9"
pytest = ">=8.0,<9"
hypothesis = ">=6.0,<7"
ruff = ">=0.11,<1"
pytest-cov = ">=5.0,<6"
pre-commit = ">=4.0,<5"
mkdocs = ">=1.6,<2"
mkdocs-material = ">=9.5,<10"
mkdocstrings = {version = ">=0.27,<1", extras = ["python"]}

[tasks]
lint = "ruff check obsidian_export/ tests/"
format-check = "ruff format --check obsidian_export/ tests/"
format = "ruff format obsidian_export/ tests/"
setup-mmdc = "npm install --prefix .mmdc @mermaid-js/mermaid-cli"
test = "pytest tests/ -v --tb=short"
test-cov = "pytest tests/ -v --tb=short --cov=obsidian_export --cov-report=term-missing"
pre-commit-install = "pre-commit install"
docs-build = "mkdocs build --strict"
docs-serve = "mkdocs serve"
